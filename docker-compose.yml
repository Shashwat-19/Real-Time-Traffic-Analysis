services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs

  dashboard:
    build: .
    command: streamlit run src/app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
    depends_on:
      - api

  scheduler:
    build: .
    command: python main.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
